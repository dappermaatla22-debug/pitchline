<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4D7D"/>
      <stop offset="100%" style="stop-color:#ff6b90"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4D7D;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF4D7D;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Subtle glow -->
  <circle cx="256" cy="240" r="180" fill="url(#glow)"/>
  
  <!-- Football/Pitch outline -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
  
  <!-- Football pentagon pattern (simplified) -->
  <g transform="translate(256,220)" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <polygon points="0,-45 42.8,-13.9 26.5,36.4 -26.5,36.4 -42.8,-13.9" />
    <line x1="0" y1="-45" x2="0" y2="-100" />
    <line x1="42.8" y1="-13.9" x2="85" y2="-28" />
    <line x1="26.5" y1="36.4" x2="53" y2="72" />
    <line x1="-26.5" y1="36.4" x2="-53" y2="72" />
    <line x1="-42.8" y1="-13.9" x2="-85" y2="-28" />
  </g>
  
  <!-- Trend line going up (representing data/predictions) -->
  <polyline points="120,320 180,280 220,290 280,240 320,250 392,180" 
    fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Trend dots -->
  <circle cx="120" cy="320" r="6" fill="#FF4D7D"/>
  <circle cx="280" cy="240" r="6" fill="#FF4D7D"/>
  <circle cx="392" cy="180" r="8" fill="#FF4D7D"/>
  
  <!-- Arrow head on trend -->
  <polyline points="375,180 392,180 392,197" fill="none" stroke="#FF4D7D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text: PITCHLINE -->
  <text x="256" y="400" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="4" fill="white">PITCH</text>
  <text x="256" y="400" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="4" fill="#FF4D7D">LINE</text>
  
  <!-- Accent line under text -->
  <rect x="180" y="415" width="152" height="3" rx="1.5" fill="url(#accent)"/>
</svg>